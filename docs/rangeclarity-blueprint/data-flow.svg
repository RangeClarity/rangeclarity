<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif" role="img" aria-label="RangeClarity runtime data flow">
  <title>RangeClarity runtime data flow</title>
  <desc>Chart OHLCV and request.security reads feed the Pine engine, which produces zones and separate Structure and Entry scores, a five-state machine with reasons, the dashboard and plots, and a confirmed-bar alert that may be sent outbound by webhook. The backend cannot call back into Pine.</desc>
  <defs>
    <marker id="s2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#34e0c4"/></marker>
    <marker id="o2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e8b84b"/></marker>
    <marker id="b2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#ef5f6b"/></marker>
  </defs>
  <rect width="1000" height="460" fill="#0b0f1a"/>
  <text x="40" y="40" fill="#e6edf6" font-size="20" font-weight="500">RangeClarity — runtime data flow</text>

  <g font-size="12" text-anchor="middle">
    <rect x="40" y="70" width="150" height="56" rx="8" fill="#0e1626" stroke="#1d6e56"/><text x="115" y="94" fill="#cdd6e2">Chart OHLCV</text><text x="115" y="112" fill="#8a97ab" font-size="11">+ volume (direct)</text>
    <rect x="40" y="150" width="150" height="50" rx="8" fill="#0e1626" stroke="#1d6e56"/><text x="115" y="172" fill="#cdd6e2">Weekly confirm</text><text x="115" y="190" fill="#8a97ab" font-size="11">request.security [1]</text>
    <rect x="40" y="224" width="150" height="50" rx="8" fill="#0e1626" stroke="#1d6e56"/><text x="115" y="246" fill="#cdd6e2">SPY / sector</text><text x="115" y="264" fill="#8a97ab" font-size="11">request.security</text>

    <rect x="250" y="120" width="160" height="90" rx="8" fill="#111726" stroke="rgba(124,247,255,.18)"/><text x="330" y="150" fill="#34e0c4">Data gate +</text><text x="330" y="170" fill="#34e0c4">features</text><text x="330" y="190" fill="#8a97ab" font-size="11">MA/pivots/ATR/RVOL</text>

    <rect x="470" y="70" width="160" height="64" rx="8" fill="#111726" stroke="rgba(124,247,255,.18)"/><text x="550" y="98" fill="#cdd6e2">S/R zones</text><text x="550" y="116" fill="#8a97ab" font-size="11">ATR-clustered pivots</text>
    <rect x="470" y="150" width="160" height="64" rx="8" fill="#111726" stroke="rgba(124,247,255,.18)"/><text x="550" y="178" fill="#cdd6e2">Structure + Entry</text><text x="550" y="196" fill="#8a97ab" font-size="11">two separate scores</text>
    <rect x="470" y="230" width="160" height="64" rx="8" fill="#111726" stroke="rgba(124,247,255,.18)"/><text x="550" y="258" fill="#cdd6e2">Relative strength</text><text x="550" y="276" fill="#8a97ab" font-size="11">vs SPY / sector</text>

    <rect x="690" y="120" width="150" height="90" rx="8" fill="#16122a" stroke="#534ab7"/><text x="765" y="150" fill="#afa9ec">State machine</text><text x="765" y="170" fill="#cdd6e2" font-size="11">5 states + reasons</text><text x="765" y="190" fill="#8a97ab" font-size="11">preview→confirmed</text>

    <rect x="690" y="240" width="150" height="56" rx="8" fill="#0e1626" stroke="#185fa5"/><text x="765" y="264" fill="#85b7eb">Dashboard +</text><text x="765" y="282" fill="#85b7eb">plots 0–9</text>

    <rect x="690" y="330" width="150" height="50" rx="8" fill="#1c1605" stroke="#854f0b"/><text x="765" y="352" fill="#e8b84b">alert() confirmed</text><text x="765" y="370" fill="#8a97ab" font-size="11">→ webhook</text>
    <rect x="690" y="404" width="270" height="44" rx="8" fill="#0e1626" stroke="#5f5e5a"/><text x="825" y="431" fill="#b4b2a9">RangeClarity backend (optional)</text>
  </g>

  <g stroke="#34e0c4" stroke-width="2" fill="none">
    <line x1="190" y1="98" x2="248" y2="150" marker-end="url(#s2)"/>
    <line x1="190" y1="175" x2="248" y2="165" marker-end="url(#s2)"/>
    <line x1="410" y1="150" x2="468" y2="120" marker-end="url(#s2)"/>
    <line x1="410" y1="175" x2="468" y2="182" marker-end="url(#s2)"/>
    <line x1="190" y1="249" x2="468" y2="258" marker-end="url(#s2)"/>
    <line x1="630" y1="110" x2="688" y2="150" marker-end="url(#s2)"/>
    <line x1="630" y1="182" x2="688" y2="168" marker-end="url(#s2)"/>
    <line x1="630" y1="262" x2="688" y2="185" marker-end="url(#s2)"/>
    <line x1="765" y1="210" x2="765" y2="238" marker-end="url(#s2)"/>
  </g>
  <line x1="765" y1="296" x2="765" y2="328" stroke="#e8b84b" stroke-width="2" marker-end="url(#o2)"/>
  <line x1="765" y1="380" x2="765" y2="402" stroke="#e8b84b" stroke-width="2" marker-end="url(#o2)"/>
  <line x1="688" y1="426" x2="430" y2="426" stroke="#ef5f6b" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#b2)"/>
  <text x="470" y="418" fill="#ef5f6b" font-size="11">✕ backend cannot call Pine</text>
</svg>
